name: Build & Deploy Backend

on:
  push:
    tags:
      - 'backend-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: romaxa55/iptv-parser
  NAMESPACE: megav-iptv
  BUILD_NAMESPACE: megav-iptv

jobs:
  build:
    runs-on: [self-hosted, iptv]
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get image tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
        else
          TAG="${GITHUB_REF#refs/tags/backend-}"
        fi
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Image tag: ${TAG}"

    - name: Setup kubectl
      run: |
        if ! command -v kubectl &> /dev/null; then
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
        fi

    - name: Configure kubeconfig
      run: |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        SERVER=${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}
        mkdir -p ~/.kube
        kubectl config set-cluster k8s --server=https://${SERVER} --certificate-authority=${CA} --kubeconfig ~/.kube/config
        kubectl config set-credentials sa --token=${TOKEN} --kubeconfig ~/.kube/config
        kubectl config set-context default --cluster=k8s --user=sa --kubeconfig ~/.kube/config
        kubectl config use-context default --kubeconfig ~/.kube/config

    - name: Create GHCR push secret for Kaniko
      run: |
        kubectl -n ${{ env.BUILD_NAMESPACE }} delete secret kaniko-ghcr-iptv --ignore-not-found
        kubectl -n ${{ env.BUILD_NAMESPACE }} create secret docker-registry kaniko-ghcr-iptv \
          --docker-server=${{ env.REGISTRY }} \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }}

    - name: Build with Kaniko (no PVC)
      run: |
        TAG="${{ steps.tag.outputs.tag }}"
        IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        NS="${{ env.BUILD_NAMESPACE }}"

        tar -czf /tmp/iptv-context.tar.gz -C $GITHUB_WORKSPACE/backend .

        kubectl -n ${NS} delete job kaniko-build-iptv --ignore-not-found
        kubectl -n ${NS} delete pod kaniko-iptv-loader --ignore-not-found --force 2>/dev/null || true
        kubectl -n ${NS} delete pvc kaniko-context-iptv --ignore-not-found
        sleep 2

        cat <<EOFJOB | kubectl apply -n ${NS} -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: kaniko-build-iptv
        spec:
          backoffLimit: 0
          ttlSecondsAfterFinished: 120
          template:
            spec:
              restartPolicy: Never
              nodeSelector:
                node-role.kubernetes.io/worker: ""
              initContainers:
              - name: load-context
                image: alpine:3.19
                command: ["sh", "-c", "echo 'Waiting for context upload...' && sleep 5 && while [ ! -f /workspace/.context-ready ]; do sleep 1; done && echo 'Context ready'"]
                volumeMounts:
                - name: workspace
                  mountPath: /workspace
              containers:
              - name: kaniko
                image: gcr.io/kaniko-project/executor:latest
                args:
                - --dockerfile=Dockerfile
                - --context=dir:///workspace
                - --destination=${IMAGE}:${TAG}
                - --destination=${IMAGE}:latest
                - --cache=true
                - --cache-repo=${IMAGE}/cache
                - --snapshot-mode=redo
                - --compressed-caching=false
                volumeMounts:
                - name: workspace
                  mountPath: /workspace
                - name: docker-config
                  mountPath: /kaniko/.docker
              volumes:
              - name: workspace
                emptyDir: {}
              - name: docker-config
                secret:
                  secretName: kaniko-ghcr-iptv
                  items:
                  - key: .dockerconfigjson
                    path: config.json
        EOFJOB

        echo "Waiting for init container to start..."
        kubectl wait -n ${NS} pod -l job-name=kaniko-build-iptv --for=condition=Initialized=False --timeout=60s 2>/dev/null || true
        sleep 3

        POD=$(kubectl get pods -n ${NS} -l job-name=kaniko-build-iptv -o jsonpath='{.items[0].metadata.name}')
        echo "Uploading context to ${POD}..."

        kubectl wait -n ${NS} pod/${POD} -c load-context --for=condition=Ready=False --timeout=60s 2>/dev/null || true
        sleep 2

        kubectl cp /tmp/iptv-context.tar.gz ${NS}/${POD}:/workspace/context.tar.gz -c load-context
        kubectl exec -n ${NS} ${POD} -c load-context -- sh -c "cd /workspace && tar xzf context.tar.gz && rm context.tar.gz && touch .context-ready"

        echo "Context uploaded, waiting for Kaniko build..."
        kubectl wait -n ${NS} job/kaniko-build-iptv --for=condition=Complete --timeout=900s || {
          echo "Build failed! Logs:"
          kubectl logs -n ${NS} -l job-name=kaniko-build-iptv -c kaniko --tail=100
          exit 1
        }

        echo "Build logs:"
        kubectl logs -n ${NS} -l job-name=kaniko-build-iptv -c kaniko --tail=30
        echo "Image pushed: ${IMAGE}:${TAG}"

    - name: Cleanup build resources
      if: always()
      run: |
        kubectl -n ${{ env.BUILD_NAMESPACE }} delete job kaniko-build-iptv --ignore-not-found
        kubectl -n ${{ env.BUILD_NAMESPACE }} delete secret kaniko-ghcr-iptv --ignore-not-found

  deploy:
    runs-on: [self-hosted, iptv]
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup tools
      run: |
        if ! command -v kubectl &> /dev/null; then
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
        fi
        if ! command -v helm &> /dev/null; then
          curl -s https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        fi

    - name: Configure kubeconfig
      run: |
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        SERVER=${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}
        mkdir -p ~/.kube
        kubectl config set-cluster k8s --server=https://${SERVER} --certificate-authority=${CA} --kubeconfig ~/.kube/config
        kubectl config set-credentials sa --token=${TOKEN} --kubeconfig ~/.kube/config
        kubectl config set-context default --cluster=k8s --user=sa --kubeconfig ~/.kube/config
        kubectl config use-context default --kubeconfig ~/.kube/config

    - name: Deploy with Helm
      run: |
        TAG="${{ needs.build.outputs.tag }}"
        echo "Deploying iptv-parser ${TAG}"

        helm upgrade --install iptv-parser ./charts/iptv-parser/ \
          --namespace ${{ env.NAMESPACE }} \
          --set image.tag="${TAG}" \
          --wait \
          --timeout 3m

        echo "Deployed iptv-parser ${TAG}"
        kubectl get pods -n ${{ env.NAMESPACE }}
