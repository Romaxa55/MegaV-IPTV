name: megav_iptv
description: "MegaV IPTV Player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Video Engine — Primary (media_kit / libmpv / FFmpeg)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Video Engine — System (Media3 native Activity, AFR, HDR)
  flutter_tv_media3: ^0.2.0

  # UI & Adaptivity
  flutter_screenutil: ^5.9.3
  responsive_builder: ^0.7.1

  # Architecture
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.3.4

  # EPG / Database
  sqflite: ^2.4.1
  path: ^1.9.0
  xml: ^6.5.0

  # Network
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
