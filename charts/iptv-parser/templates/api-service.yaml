{{- if .Values.apiService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iptv-parser.fullname" . }}-api
  labels:
    {{- include "iptv-parser.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.apiService.port }}
      protocol: TCP
  selector:
    {{- include "iptv-parser.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
