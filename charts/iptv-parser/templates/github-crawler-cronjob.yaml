{{- if .Values.githubCrawler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "iptv-parser.fullname" . }}-github-crawler
  labels:
    {{- include "iptv-parser.labels" . | nindent 4 }}
    app.kubernetes.io/component: github-crawler
spec:
  schedule: {{ .Values.githubCrawler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            {{- include "iptv-parser.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: github-crawler
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "iptv-parser.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: github-crawler
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["./bin/github-crawler"]
              args:
                - "-min-stars"
                - {{ .Values.githubCrawler.minStars | quote }}
                - "-max-age-days"
                - {{ .Values.githubCrawler.maxAgeDays | quote }}
                - "-min-channels"
                - {{ .Values.githubCrawler.minChannels | quote }}
                {{- if .Values.githubCrawler.debug }}
                - "-debug"
                {{- end }}
              env:
                {{- include "iptv-parser.redisEnv" . | nindent 16 }}
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.githubCrawler.githubTokenSecret }}
                      key: {{ .Values.githubCrawler.githubTokenKey }}
              resources:
                {{- toYaml .Values.githubCrawler.resources | nindent 16 }}
      backoffLimit: 2
{{- end }}
