{{- if .Values.channelChecker.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "iptv-parser.fullname" . }}-channel-checker
  labels:
    {{- include "iptv-parser.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-checker
spec:
  schedule: {{ .Values.channelChecker.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            {{- include "iptv-parser.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: channel-checker
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "iptv-parser.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: channel-checker
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["./bin/channel-checker"]
              args:
                - "-workers"
                - "{{ .Values.channelChecker.workers }}"
                - "-batch"
                - "{{ .Values.channelChecker.batch }}"
                {{- if .Values.channelChecker.debug }}
                - "-debug"
                {{- end }}
              env:
                {{- include "iptv-parser.dbEnv" . | nindent 16 }}
                - name: TIMEOUT
                  value: "10s"
                - name: DB_MAX_OPEN_CONNS
                  value: "50"
                - name: DB_MAX_IDLE_CONNS
                  value: "20"
              resources:
                {{- toYaml .Values.channelChecker.resources | nindent 16 }}
      backoffLimit: 2
{{- end }}
