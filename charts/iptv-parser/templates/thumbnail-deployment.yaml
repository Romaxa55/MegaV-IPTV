{{- if .Values.thumbnailWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iptv-parser.fullname" . }}-thumbnail
  labels:
    {{- include "iptv-parser.labels" . | nindent 4 }}
    app.kubernetes.io/component: thumbnail
spec:
  replicas: {{ .Values.thumbnailWorker.replicas }}
  selector:
    matchLabels:
      {{- include "iptv-parser.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: thumbnail
  template:
    metadata:
      labels:
        {{- include "iptv-parser.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: thumbnail
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "iptv-parser.serviceAccountName" . }}
      containers:
        - name: thumbnail-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["./bin/thumbnail-worker"]
          args:
            - "-workers"
            - "{{ .Values.thumbnailWorker.workers }}"
            - "-output"
            - "{{ .Values.thumbnailWorker.outputDir }}"
          env:
            {{- include "iptv-parser.dbEnv" . | nindent 12 }}
            {{- include "iptv-parser.redisEnv" . | nindent 12 }}
          {{- if .Values.thumbnailStorage.enabled }}
          volumeMounts:
            - name: thumbnails
              mountPath: {{ .Values.thumbnailWorker.outputDir }}
          {{- end }}
          resources:
            {{- toYaml .Values.thumbnailWorker.resources | nindent 12 }}
      {{- if .Values.thumbnailStorage.enabled }}
      volumes:
        - name: thumbnails
          persistentVolumeClaim:
            claimName: {{ include "iptv-parser.fullname" . }}-thumbnails
      {{- end }}
{{- end }}
