image:
  repository: ghcr.io/romaxa55/iptv-parser
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

# Cross-namespace shared infrastructure (from megav namespace)
postgresql:
  host: "megav-heavy.megav.svc.cluster.local"
  port: "5432"
  database: "megav_sources"
  existingSecret: "postgres.megav-heavy.credentials.postgresql.acid.zalan.do"
  usernameKey: "username"
  passwordKey: "password"

# IPTV playlist & EPG URLs (stored in a manually created K8s Secret)
# Create with: kubectl create secret generic iptv-urls -n <namespace> \
#   --from-literal=playlist-url='YOUR_PLAYLIST_URL' \
#   --from-literal=epg-url='YOUR_EPG_URL'
iptv:
  existingSecret: "iptv-urls"
  playlistUrlKey: "playlist-url"
  epgUrlKey: "epg-url"

# --- API Server ---
apiService:
  enabled: true
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Thumbnail Worker Deployment ---
thumbnailWorker:
  enabled: true
  replicas: 3
  workers: 50
  outputDir: "/app/thumbnails"
  resources:
    requests:
      cpu: 1000m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 2Gi

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: iptv.megav.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: iptv-megav-app-tls
      hosts:
        - iptv.megav.app

# --- Service Account ---
serviceAccount:
  create: true
  name: ""

# --- Thumbnail PVC (shared between API and thumbnail workers) ---
thumbnailStorage:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  accessModes:
    - ReadWriteMany
