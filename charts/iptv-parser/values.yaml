image:
  repository: ghcr.io/romaxa55/iptv-parser
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

# Cross-namespace shared infrastructure (from megav namespace)
postgresql:
  host: "megav-heavy.megav.svc.cluster.local"
  port: "5432"
  database: "megav_sources"
  existingSecret: "postgres.megav-heavy.credentials.postgresql.acid.zalan.do"
  usernameKey: "username"
  passwordKey: "password"

# Redis (shared from megav namespace)
redis:
  host: "redis-master.megav.svc.cluster.local"
  port: "6379"
  existingSecret: "redis"
  passwordKey: "redis-password"

# IPTV playlist & EPG URLs (stored in a manually created K8s Secret)
# Create with: kubectl create secret generic iptv-urls -n <namespace> \
#   --from-literal=playlist-url='YOUR_PLAYLIST_URL' \
#   --from-literal=epg-url='YOUR_EPG_URL'
iptv:
  existingSecret: "iptv-urls"
  playlistUrlKey: "playlist-url"
  epgUrlKey: "epg-url"

# Kinopoisk API (movie posters)
# Create with: kubectl create secret generic kinopoisk -n <namespace> \
#   --from-literal=api-key='YOUR_API_KEY'
kinopoisk:
  existingSecret: "kinopoisk"
  apiKeyKey: "api-key"

# --- API Server ---
apiService:
  enabled: true
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

# --- Thumbnail Worker Deployment ---
# Workers listen to Redis queue and generate thumbnails on-demand via ffmpeg.
thumbnailWorker:
  enabled: true
  replicas: 1
  workers: 4
  outputDir: "/app/thumbnails"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: iptv.megav.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: iptv-megav-app-tls
      hosts:
        - iptv.megav.app

# --- Service Account ---
serviceAccount:
  create: true
  name: ""

# --- Thumbnail PVC (shared between API and thumbnail workers) ---
thumbnailStorage:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  accessModes:
    - ReadWriteMany
